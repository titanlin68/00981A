name: ETF Real-time Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *' # 每 15 分鐘自動抓取一次官網數據

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Crawler
        run: python analysis.py

      - name: Push update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add etf_data.json
          git commit -m "Auto-update ETF data" || exit 0
          git push
