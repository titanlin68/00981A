<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00981A 官方同步監控</title>
    <style>
        :root { --red: #d63031; --green: #27ae60; --dark: #2d3436; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.07); max-width: 400px; width: 85%; }
        .header { text-align: center; margin-bottom: 25px; }
        .tag { background: #f1f2f6; color: #7f8c8d; padding: 5px 15px; border-radius: 50px; font-size: 0.85em; font-weight: 600; }
        .name { font-size: 1.8em; font-weight: 900; color: var(--dark); margin: 15px 0 0 0; letter-spacing: -0.5px; }
        .hero { text-align: center; margin: 35px 0; }
        .ratio-display { font-size: 4em; font-weight: 900; margin: 0; line-height: 1; }
        .hint { font-size: 1.15em; font-weight: 700; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 35px; border-top: 1px solid #eee; padding-top: 30px; }
        .item { text-align: center; }
        .label { color: #a4b0be; font-size: 0.8em; margin-bottom: 8px; font-weight: 600; }
        .num { font-size: 1.7em; font-weight: 800; color: var(--dark); }
        .footer { font-size: 0.75em; color: #ced6e0; text-align: center; margin-top: 40px; line-height: 1.7; }
        .live-icon { height: 8px; width: 8px; background: #00cec9; border-radius: 50%; display: inline-block; margin-right: 6px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <span class="tag">股票代號: 00981A</span>
        <div class="name">主動統一台股增長</div>
    </div>

    <div class="hero">
        <div id="r-val" class="ratio-display">--%</div>
        <div id="r-hint" class="hint">等待數據更新...</div>
    </div>

    <div class="grid">
        <div class="item">
            <div class="label">官方即時市價</div>
            <div id="p-val" class="num">--</div>
        </div>
        <div class="item">
            <div class="label">官方即時淨值</div>
            <div id="n-val" class="num">--</div>
        </div>
    </div>

    <div class="footer">
        <span class="live-icon"></span> 官方數據源同步中 | 每 5 秒更新<br>
        最後校準：<span id="ts">--</span>
    </div>
</div>

<script>
    async function syncData() {
        try {
            // 加入時間戳避免快取，確保讀取的是最新產生的 json
            const response = await fetch('etf_data.json?t=' + Date.now());
            
            if (!response.ok) {
                console.log("正在等待 GitHub Actions 產生資料檔案...");
                return;
            }

            const d = await response.json();
            
            // 更新 UI 數據
            document.getElementById('p-val').innerText = d.price.toFixed(2);
            document.getElementById('n-val').innerText = d.nav.toFixed(2);
            document.getElementById('ts').innerText = d.update_time;
            
            const rv = document.getElementById('r-val');
            const rh = document.getElementById('r-hint');
            const val = d.ratio;

            rv.innerText = (val > 0 ? '+' : '') + val.toFixed(2) + '%';
            
            // 根據數值變更顏色 (修正了語法錯誤)
            if (val > 0.15) {
                rv.style.color = 'var(--red)';
                rh.innerHTML = '⚠️ 溢價較高，建議稍候';
                rh.style.color = 'var(--red)';
            } else if (val < -0.15) {
                rv.style.color = 'var(--green)';
                rh.innerHTML = '✅ 折價吸引，適合配置';
                rh.style.color = 'var(--green)';
            } else {
                rv.style.color = '#2d3436';
                rh.innerHTML = '✨ 價格與官網淨值同步';
                rh.style.color = '#747d8c';
            }
        } catch (e) {
            console.error("解析 JSON 失敗，可能檔案內容尚在寫入:", e);
        }
    }

    // 啟動監測
    syncData();
    setInterval(syncData, 5000);
</script>

</body>
</html>
