<html lang="zh-TW">
<head>

    <title>00981A 即時折溢價監控</title>
    <style>
        body { 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            padding: 20px; 
            background-color: #f0f2f5; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            max-width: 450px; 
            width: 100%;
        }
        h2 { text-align: center; color: #1a1a1a; margin-bottom: 20px; }
        
        /* TradingView 組件容器 */
        .widget-wrapper {
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
        }

        .price-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-bottom: 20px; 
        }
        .price-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .label { color: #666; font-size: 0.85em; margin-bottom: 5px; }
        .value { font-size: 1.4em; font-weight: bold; color: #2d3436; }
        
        .status-box { 
            padding: 20px; 
            border-radius: 12px; 
            font-weight: bold; 
            text-align: center; 
            font-size: 1.3em;
            transition: all 0.3s ease;
        }
        
        .info-footer { 
            font-size: 0.75em; 
            color: #999; 
            text-align: center; 
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
