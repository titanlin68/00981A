<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00981A 即時監控</title>
    <style>
        :root { --accent: #0984e3; --red: #d63031; --green: #27ae60; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #f5f6fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 35px; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.06); max-width: 420px; width: 90%; }
        .header { text-align: center; margin-bottom: 30px; }
        .symbol-tag { background: #dfe6e9; color: #636e72; padding: 4px 12px; border-radius: 6px; font-size: 0.9em; font-weight: bold; }
        .name { font-size: 1.6em; font-weight: 800; color: #2d3436; margin: 10px 0 5px 0; }
        
        .main-score { text-align: center; margin: 30px 0; }
        .ratio-val { font-size: 3.5em; font-weight: 900; line-height: 1; margin-bottom: 10px; }
        .status-msg { font-size: 1.1em; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; padding-top: 25px; border-top: 1px dashed #ddd; }
        .data-item { text-align: center; }
        .data-label { color: #b2bec3; font-size: 0.8em; margin-bottom: 8px; }
        .data-price { font-size: 1.6em; font-weight: 700; color: #2d3436; }
        
        .footer { font-size: 0.75em; color: #b2bec3; text-align: center; margin-top: 35px; line-height: 1.6; }
        .pulse { height: 6px; width: 6px; background: #00cec9; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(2); opacity: 0; } 100% { transform: scale(1); opacity: 0; } }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <span class="symbol-tag">股票代號: 00981A</span>
        <div class="name">主動統一台股增長</div>
    </div>

    <div class="main-score">
        <div id="ratio-val" class="ratio-val">--%</div>
        <div id="status-msg" class="status-msg">正在連線報價源...</div>
    </div>

    <div class="data-grid">
        <div class="data-item">
            <div class="data-label">市場價格</div>
            <div id="price-val" class="data-price">--</div>
        </div>
        <div class="data-item">
            <div class="data-label">同步淨值</div>
            <div id="nav-val" class="data-price">--</div>
        </div>
    </div>

    <div class="footer">
        <span class="pulse"></span> 即時監控中 | 每 5 秒同步一次數據<br>
        最後更新：<span id="update-time">--</span>
    </div>
</div>

<script>
    async function updateUI() {
        try {
            const res = await fetch('etf_data.json?t=' + Date.now());
            const d = await res.json();
            
            document.getElementById('price-val').innerText = d.price.toFixed(2);
            document.getElementById('nav-val').innerText = d.nav.toFixed(2);
            document.getElementById('update-time').innerText = d.update_time;
            
            const rVal = document.getElementById('ratio-val');
            const sMsg = document.getElementById('status-msg');
            const r = d.ratio;

            rVal.innerText = (r > 0 ? '+' : '') + r.toFixed(2) + '%';
            
            if (r > 0.1) {
                rVal.style.color = 'var(--red)';
                sMsg.innerHTML = '🔴 溢價中，請謹慎買進';
                sMsg.style.color = 'var(--red)';
            } else if (r < -0.1) {
                rVal.style.color = 'var(--green)';
                sMsg.innerHTML = '🟢 折價中，目前價位較便宜';
                sMsg.style.color = 'var(--green)';
            } else {
                rVal.style.color = '#2d3436';
                sMsg.innerHTML = '⚪ 價格與淨值趨於一致';
                sMsg.style.color = '#636e72';
            }
        } catch (e) {
            console.log("Waiting for data update...");
        }
    }
    setInterval(updateUI, 5000);
    updateUI();
</script>

</body>
</html>
