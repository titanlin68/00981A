<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>00981A 監控</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        .price-box { font-size: 3em; font-weight: bold; margin: 20px 0; color: #2d3436; }
        .details { display: flex; justify-content: space-around; border-top: 1px solid #eee; padding-top: 20px; }
        .label { color: #636e72; font-size: 0.8em; }
        .val { font-size: 1.2em; font-weight: bold; }
        .footer { margin-top: 20px; font-size: 0.7em; color: #b2bec3; }
    </style>
</head>
<body>
    <div class="card">
        <div style="color: #0984e3; font-weight: bold;">00981A 統一台股增長</div>
        <div id="r-val" class="price-box">--%</div>
        <div id="hint" style="font-weight: bold; margin-bottom: 20px;">讀取中...</div>
        <div class="details">
            <div><div class="label">市價</div><div id="p-val" class="val">--</div></div>
            <div><div class="label">淨值</div><div id="n-val" class="val">--</div></div>
        </div>
        <div class="footer">更新時間：<span id="ts">--</span></div>
    </div>
    <script>
        async function load() {
            try {
                const r = await fetch('etf_data.json?t=' + Date.now());
                const d = await r.json();
                document.getElementById('p-val').innerText = d.price.toFixed(2);
                document.getElementById('n-val').innerText = d.nav.toFixed(2);
                document.getElementById('ts').innerText = d.update_time;
                const rv = document.getElementById('r-val');
                rv.innerText = (d.ratio > 0 ? '+' : '') + d.ratio.toFixed(2) + '%';
                rv.style.color = d.ratio > 0.15 ? '#d63031' : (d.ratio < -0.15 ? '#27ae60' : '#2d3436');
                document.getElementById('hint').innerText = d.ratio > 0.15 ? '溢價偏高' : '價格正常';
            } catch(e) { console.error(e); }
        }
        load(); setInterval(load, 10000);
    </script>
</body>
</html>
