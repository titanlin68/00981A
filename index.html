<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00981A 即時監控儀表板</title>
    <style>
        :root { --red: #d63031; --green: #27ae60; --dark: #2d3436; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.07); max-width: 400px; width: 85%; }
        .tag { background: #f1f2f6; color: #7f8c8d; padding: 5px 15px; border-radius: 50px; font-size: 0.85em; font-weight: 600; display: inline-block; margin-bottom: 10px; }
        .name { font-size: 1.8em; font-weight: 900; color: var(--dark); margin: 0; }
        .hero { text-align: center; margin: 35px 0; }
        .ratio-val { font-size: 4em; font-weight: 900; line-height: 1; margin: 0; }
        .hint { font-size: 1.1em; font-weight: 700; margin-top: 15px; color: #636e72; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border-top: 1px solid #eee; padding-top: 30px; margin-top: 30px; }
        .label { color: #a4b0be; font-size: 0.85em; margin-bottom: 5px; font-weight: 600; }
        .num { font-size: 1.6em; font-weight: 800; color: var(--dark); }
        .footer { font-size: 0.75em; color: #ced6e0; text-align: center; margin-top: 40px; }
        .dot { height: 8px; width: 8px; background: #00cec9; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
<div class="card" style="text-align: center;">
    <span class="tag">股票代號: 00981A</span>
    <h1 class="name">主動統一台股增長</h1>
    <div class="hero">
        <div id="r-val" class="ratio-val">--%</div>
        <div id="r-hint" class="hint">讀取中...</div>
    </div>
    <div class="grid">
        <div class="item">
            <div class="label">官方即時市價</div>
            <div id="p-val" class="num">--</div>
        </div>
        <div class="item">
            <div class="label">官方即時淨值</div>
            <div id="n-val" class="num">--</div>
        </div>
    </div>
    <div class="footer">
        <span class="dot"></span> 官方即時同步 | 每 5 秒更新顯示<br>
        最後校準：<span id="ts">--</span>
    </div>
</div>
<script>
    async function updateData() {
        try {
            const res = await fetch('etf_data.json?v=' + Date.now());
            if (!res.ok) return;
            const d = await res.json();
            document.getElementById('p-val').innerText = d.price.toFixed(2);
            document.getElementById('n-val').innerText = d.nav.toFixed(2);
            document.getElementById('ts').innerText = d.update_time;
            const rv = document.getElementById('r-val');
            const rh = document.getElementById('r-hint');
            rv.innerText = (d.ratio > 0 ? '+' : '') + d.ratio.toFixed(2) + '%';
            if (d.ratio > 0.15) {
                rv.style.color = 'var(--red)';
                rh.innerText = '⚠️ 溢價較高，建議觀望';
            } else if (d.ratio < -0.15) {
                rv.style.color = 'var(--green)';
                rh.innerText = '✅ 折價吸引，適合配置';
            } else {
                rv.style.color = 'var(--dark)';
                rh.innerText = '✨ 價格與官網淨值同步';
            }
        } catch(e) {}
    }
    updateData();
    setInterval(updateData, 5000);
</script>
</body>
</html>
